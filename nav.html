<!DOCTYPE html>
<html>
<head>
    <style>
        /* Navigation Styles */
        nav {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 1rem 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            letter-spacing: 1px;
        }

        .logo:hover {
            color: #ffd700;
        }

        nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 2rem;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-family: 'Arial', sans-serif;
        }

        nav ul li a:hover {
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            transform: translateY(-2px);
        }

        /* Mobile Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: white;
            margin: 3px 0;
            transition: 0.3s;
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            nav ul {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                padding-top: 2rem;
                transition: 0.3s;
            }

            nav ul.active {
                left: 0;
            }

            nav ul li {
                margin: 1rem 0;
                opacity: 0;
                transform: translateX(30px);
                transition: 0.3s ease;
            }

            nav ul li:nth-child(1) { transition-delay: 0.1s; }
            nav ul li:nth-child(2) { transition-delay: 0.2s; }
            nav ul li:nth-child(3) { transition-delay: 0.3s; }
            nav ul li:nth-child(4) { transition-delay: 0.4s; }

            nav ul.active li {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Page content padding to avoid nav overlap */
        body {
            padding-top: 80px;
            margin: 0;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">BluePeak</a>
        <ul id="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('active');
        }
    </script>
</body>
</html>
